<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qure Gallery | Tanay Shah</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    body {
      background: #f8f9fa;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .gallery-header {
      background: #000;
      color: white;
      text-align: center;
      padding: 25px 15px;
      margin-bottom: 30px;
    }

    .gallery-header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .gallery-header p {
      margin-top: 10px;
      color: #ccc;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: auto;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 14px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.15);
      cursor: pointer;
      background: white;
      transition: transform 0.25s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
    }

    .gallery-item img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .back-btn {
      margin: 30px auto;
      display: block;
      width: fit-content;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 10px;
    }

    .close-btn {
      position: absolute;
      top: 25px;
      right: 35px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: white;
      cursor: pointer;
      padding: 20px;
      user-select: none;
    }

    .prev-btn { left: 20px; }
    .next-btn { right: 20px; }
  </style>
</head>
<body>

  <div class="gallery-header">
    <h1>Qure Gallery</h1>
    <p>Project Screenshots (24 Images)</p>
  </div>

  <div class="gallery-grid" id="gallery"></div>


  <div class="lightbox" id="lightbox">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    <span class="nav-btn prev-btn" onclick="prevImage()">❮</span>
    <img id="lightbox-img">
    <span class="nav-btn next-btn" onclick="nextImage()">❯</span>
  </div>

  <script>
    const totalImages = 24;
    const gallery = document.getElementById("gallery");
    const images = [];

    for (let i = 1; i <= totalImages; i++) {
      const path = `/assets/projects/Qure/${i}.png`;
      images.push(path);

      const div = document.createElement("div");
      div.className = "gallery-item";
      div.innerHTML = `<img src="${path}" loading="lazy" alt="Qure Image ${i}">`;
      div.onclick = () => openLightbox(i - 1);
      gallery.appendChild(div);
    }

    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById("lightbox-img").src = images[currentIndex];
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      document.getElementById("lightbox-img").src = images[currentIndex];
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      document.getElementById("lightbox-img").src = images[currentIndex];
    }

    document.addEventListener("keydown", function(e) {
      const lightbox = document.getElementById("lightbox");
      if (lightbox.style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
      }
    });
  </script>

</body>
</html>
